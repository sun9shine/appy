name: 🏗️ Build APK + AAB

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'نوع البناء'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - apk_only
          - aab_only

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. تحميل الكود ──────────────────────────────
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. إعداد Node.js ─────────────────────────────
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: healthsphere-app/package-lock.json

      # ── 3. تثبيت المكتبات ───────────────────────────
      - name: 📦 npm install
        working-directory: ./healthsphere-app
        run: npm install --legacy-peer-deps

      # ── 4. بناء الويب ───────────────────────────────
      - name: 🌐 Build web (Vite)
        working-directory: ./healthsphere-app
        run: npm run build

      # ── 5. مزامنة Capacitor ──────────────────────────
      - name: 🔄 Capacitor sync android
        working-directory: ./healthsphere-app
        run: npx cap sync android

      # ── 6. إعداد Java 17 ─────────────────────────────
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 7. صلاحيات gradlew ──────────────────────────
      - name: 🔐 chmod gradlew
        working-directory: ./healthsphere-app/android
        run: chmod +x gradlew

      # ══════════════════════════════════════════════════
      #  🟢 APK — للاختبار (debug, لا يحتاج keystore)
      # ══════════════════════════════════════════════════
      - name: 🔨 Build DEBUG APK
        working-directory: ./healthsphere-app/android
        run: ./gradlew assembleDebug

      - name: 📤 Upload DEBUG APK
        uses: actions/upload-artifact@v4
        with:
          name: HealthSphere-DEBUG.apk
          path: healthsphere-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ══════════════════════════════════════════════════
      #  🔵 AAB — للنشر على Google Play (يحتاج keystore)
      #  يعمل فقط إذا أضفت Secrets في GitHub
      # ══════════════════════════════════════════════════
      - name: 🔑 Setup keystore for signing
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > healthsphere-app/android/app/healthsphere-key.jks
          echo "✅ Keystore decoded"

      - name: 📦 Build RELEASE AAB (signed)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        working-directory: ./healthsphere-app/android
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/healthsphere-app/android/app/healthsphere-key.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEY_STORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: 📤 Upload RELEASE AAB
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: HealthSphere-RELEASE.aab
          path: healthsphere-app/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 30

      # ── AAB بدون توقيع (unsigned) — إذا لا يوجد keystore
      - name: 📦 Build UNSIGNED AAB
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        working-directory: ./healthsphere-app/android
        run: ./gradlew bundleDebug

      - name: 📤 Upload UNSIGNED AAB
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: HealthSphere-UNSIGNED.aab
          path: healthsphere-app/android/app/build/outputs/bundle/debug/app-debug.aab
          retention-days: 30
